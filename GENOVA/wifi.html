<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WiFi del apartamento — Grupo Oliveira</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f7;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #3A5068;
    color: white;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-back {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 22px;
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
  }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  /* Content */
  .normas-page { padding: 0; background: #f0f4f7; flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; }
  .normas-block { margin: 14px 16px 0; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .normas-block-header {
    background: #3A5068; color: white;
    padding: 12px 16px;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .normas-block-body { padding: 14px 16px; }
  .normas-text-block { font-size: 13px; color: #444; line-height: 1.6; padding: 4px 0; }

  .wifi-hero-icon {
    width: 64px; height: 64px;
    margin: 0 auto 6px;
    border-radius: 18px;
    background: #dff0f5;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }

  .wifi-card {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .wifi-pill {
    flex: 1; min-width: 130px;
    background: #f0f4f7; border-radius: 10px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .wifi-pill-label { font-size: 10.5px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .wifi-pill-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .wifi-pill-value { font-size: 16px; color: #3A5068; font-weight: 700; font-family: 'SFMono-Regular', Consolas, monospace; word-break: break-all; }
  .wifi-copy-btn {
    background: #EEF0FA; color: #3A5068;
    border: none; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    padding: 6px 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .wifi-copy-btn:active { background: #dbe0f5; }
  .wifi-copy-btn.copied { background: #e8f8f0; color: #27AE60; }

  .legal-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 16px 14px;
    background: #f0f4f7;
    flex-shrink: 0;
    border-top: 1px solid #d8e4ec;
  }
  .legal-links { display: flex; gap: 6px; align-items: center; }
  .legal-links a { font-size: 10.5px; color: #7a9ab0; text-decoration: none; letter-spacing: 0.01em; }
  .legal-links a:hover { color: #3A5068; }
  .legal-links-sep { font-size: 9px; color: #b0c4d0; }
  .legal-brand { font-size: 9px; color: #b0c4d0; letter-spacing: 0.04em; }
</style>
</head>
<body>

  <div class="header">
    <a class="header-back" onclick="history.back()">‹</a>
    <div>
      <div class="header-title">WiFi del apartamento</div>
      <div class="header-sub">Grupo Oliveira · Apartamentos Génova</div>
    </div>
  </div>

  <div class="normas-page"> 

    <div class="normas-block">
      <div class="normas-block-header">🛜 Conexión WiFi</div>
      <div class="normas-block-body">
        <div class="wifi-hero-icon">🛜</div>
        <div class="normas-text-block" style="text-align:center;">El apartamento cuenta con WiFi de alta velocidad.</div>
        <div class="wifi-card">
          <div class="wifi-pill">
            <div class="wifi-pill-label">Red</div>
            <div class="wifi-pill-row">
              <span class="wifi-pill-value" id="wifi-ssid">Genova</span>
              <button class="wifi-copy-btn" onclick="copyValue('wifi-ssid', this)">Copiar</button>
            </div>
          </div>
          <div class="wifi-pill">
            <div class="wifi-pill-label">Contraseña</div>
            <div class="wifi-pill-row">
              <span class="wifi-pill-value" id="wifi-pass">Amadeo24</span>
              <button class="wifi-copy-btn" onclick="copyValue('wifi-pass', this)">Copiar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Pie legal -->
  <div class="legal-footer">
    <div class="legal-links">
      <a href="https://apartamentosgo.com/politica-de-privacidad/" target="_blank">Política de privacidad</a>
      <span class="legal-links-sep">·</span>
      <a href="https://apartamentosgo.com/aviso-legal/" target="_blank">Aviso legal</a>
    </div>
    <div class="legal-brand">Diseñado por StandQR</div>
  </div>

<script>
function copyValue(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1500);
  });
}
</script>

</body>
</html>
