<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WiFi del apartamento</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f7;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #3A5068;
    color: #EAF4F8;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-back {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    color: #EAF4F8;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    text-decoration: none;
  }
  .header-title { font-size: 15px; font-weight: 600; }

  /* WiFi */
  .wifi-page {
    padding: 10px;
    background: #f0f4f7;
    flex: 1;
    overflow-y: auto;
  }
  .wifi-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .wifi-header-bar {
    background: linear-gradient(135deg, #7bbfcc, #3A5068);
    padding: 14px;
    text-align: center;
    color: white;
  }
  .wifi-icon-lg { font-size: 28px; margin-bottom: 8px; }
  .wifi-header-title { font-size: 16px; font-weight: 600; }
  .wifi-header-sub { font-size: 12px; opacity: 0.75; margin-top: 3px; }
  .wifi-body { padding: 4px 16px; }
  .wifi-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid #f0f0f0; }
  .wifi-row:last-child { border-bottom: none; }
  .wifi-label { font-size: 13px; color: #888; }
  .wifi-val-wrap { display: flex; align-items: center; gap: 8px; }
  .wifi-val { font-size: 14px; font-weight: 600; color: #1a1a1a; font-family: 'Courier New', monospace; }
  .copy-btn {
    background: #f0f4f7;
    border: 1px solid #c8d8e4;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    color: #888;
    font-family: inherit;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: #d4eaf0; }
  .copy-btn.copied { color: #3A5068; border-color: #3A5068; background: #dff0f5; }
  .qr-section { padding: 20px; text-align: center; }
  .qr-title { font-size: 13px; color: #888; margin-bottom: 14px; font-weight: 500; }
  .qr-box {
    width: 150px; height: 150px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: #f8fbfc;
  }
  .qr-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .qr-note { font-size: 11px; color: #aaa; margin-top: 12px; }
</style>
</head>
<body>

  <div class="header">
    <a class="header-back" href="index.html">‹</a>
    <div><div class="header-title">WiFi del apartamento</div></div>
  </div>

  <div class="wifi-page">
    <div class="wifi-card">
      <div class="wifi-header-bar">
        <div class="wifi-icon-lg">🛜</div>
        <div class="wifi-header-title">Conexión WiFi gratuita</div>
        <div class="wifi-header-sub">Incluida en tu estancia</div>
      </div>
      <div class="wifi-body">
        <div class="wifi-row">
          <span class="wifi-label">Red (SSID)</span>
          <div class="wifi-val-wrap">
            <span class="wifi-val">Tordesillas House</span>
            <button class="copy-btn" onclick="copyText(this.previousElementSibling.textContent, this)">copiar</button>
          </div>
        </div>
        <div class="wifi-row">
          <span class="wifi-label">Contraseña</span>
          <div class="wifi-val-wrap">
            <span class="wifi-val">12342019</span>
            <button class="copy-btn" onclick="copyText(this.previousElementSibling.textContent, this)">copiar</button>
          </div>
        </div>
        <div class="wifi-row">
          <span class="wifi-label">Seguridad</span>
          <div class="wifi-val-wrap"><span class="wifi-val">WPA2</span></div>
        </div>
      </div>
    </div>
    <div class="wifi-card">
      <div class="qr-section">
        <div class="qr-title">Escanea para conectarte automáticamente</div>
        <div class="qr-box">
          <img src="qr_wifi.jpg" alt="QR WiFi"/>
        </div>
        <div class="qr-note">Apunta la cámara · No necesitas ninguna app</div>
      </div>
    </div>
  </div>

<script>
function copyText(txt, btn) {
  try {
    const el = document.createElement('textarea');
    el.value = txt;
    el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(el);
    el.focus();
    el.select();
    el.setSelectionRange(0, 99999);
    document.execCommand('copy');
    document.body.removeChild(el);
    btn.textContent = '✓ copiado'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    btn.textContent = '✗ error'; setTimeout(() => btn.textContent = 'copiar', 1500);
  }
}
</script>
</body>
</html>
